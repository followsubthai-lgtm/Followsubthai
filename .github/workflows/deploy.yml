name: Build and Deploy to Cloud Run
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        token_format: 'access_token'
        workload_identity_provider: 'projects/383758038568/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'github-actions-cloudrun@followsubthai-3a814.iam.gserviceaccount.com'

    - name: Set up gcloud CLI
      uses: google-github-actions/setup-gcloud@v2

    # จัดการการสร้างคลังแสง Docker ยุคใหม่ (Artifact Registry) อัตโนมัติ ป้องกันด่าน legacy พัง
    - name: Ensure Artifact Registry Exists
      run: |
        gcloud artifacts repositories describe followsubthai-repo --location=asia-southeast1 || \
        gcloud artifacts repositories create followsubthai-repo \
          --repository-format=docker \
          --location=asia-southeast1 \
          --description="Demon Subtitle Production Repository"

    # รันลูปพลังอสูร บิลด์และดีพพลอยขยับพอร์ตไปที่ 3000 ตาม Next.js Engine
    - name: Build and Deploy to Cloud Run
      run: |
        gcloud builds submit \
          --tag asia-southeast1-docker.pkg.dev/followsubthai-3a814/followsubthai-repo/webapp:latest
          
        gcloud run deploy followsubthai \
          --image asia-southeast1-docker.pkg.dev/followsubthai-3a814/followsubthai-repo/webapp:latest \
          --platform managed \
          --region asia-southeast1 \
          --allow-unauthenticated \
          --port 3000
